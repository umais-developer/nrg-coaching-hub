<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · NRG Coaching Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <script src="assets/js/config.js?v=20260519"></script>
</head>
<body>
  <main class="container">
    <nav class="top-nav">
      <div class="brand">NRG Coaching Hub</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="coach-notes.html">Meeting Notes</a>
        <a href="discussions.html">Discussions</a>
        <a href="uploads.html">Uploads</a>
      </div>
    </nav>

    <section class="hero">
      <h1>GitHub Login</h1>
      <p>
        Sign in once, then save notes and upload files directly into your repository folders by member.
      </p>
    </section>

    <section class="card">
      <div id="status" class="notice">Ready to sign in.</div>
      <button id="signinBtn" class="button">Sign In With GitHub</button>
      <button id="logoutBtn" class="button" type="button">Sign Out</button>
      <div class="footer-note" id="whoami">Not signed in.</div>
    </section>
  </main>

  <script type="module">
    import {
      completeOAuthIfNeeded,
      fetchCurrentUser,
      getConfig,
      getToken,
      logout,
      startSignIn
    } from "./assets/js/github-auth.js";

    const status = document.getElementById("status");
    const whoami = document.getElementById("whoami");

    async function refreshUser() {
      if (!getToken()) {
        whoami.textContent = "Not signed in.";
        return;
      }

      try {
        const user = await fetchCurrentUser();
        whoami.textContent = `Signed in as ${user.login}`;
      } catch (error) {
        whoami.textContent = `Unable to read user profile: ${error.message}`;
      }
    }

    const cfg = getConfig();
    if (cfg.missing.length) {
      status.textContent = `Missing config values in assets/js/config.js: ${cfg.missing.join(", ")}`;
      status.className = "notice";
    }

    try {
      const oauthResult = await completeOAuthIfNeeded();
      if (oauthResult.changed) {
        status.textContent = "Login successful. Redirecting...";
        status.className = "notice ok";
        location.href = oauthResult.target;
      }
    } catch (error) {
      status.textContent = `Sign-in callback failed: ${error.message}`;
      status.className = "notice";
    }

    await refreshUser();

    document.getElementById("signinBtn").addEventListener("click", () => {
      try {
        startSignIn("coach-notes.html");
      } catch (error) {
        status.textContent = error.message;
        status.className = "notice";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      logout();
      status.textContent = "Signed out.";
      status.className = "notice";
      refreshUser();
    });
  </script>
</body>
</html>
