<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uploads · NRG Coaching Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <script src="assets/js/config.js?v=20260519"></script>
</head>
<body>
  <main class="container">
    <nav class="top-nav">
      <div class="brand">NRG Coaching Hub</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="coach-notes.html">Meeting Notes</a>
        <a href="discussions.html">Discussions</a>
        <a href="login.html">Login</a>
      </div>
    </nav>

    <section class="hero">
      <h1>Ad-Hoc Member File Upload</h1>
      <p>
        Select a team member, choose a file, and store it in their uploads folder.
      </p>
    </section>

    <section class="card">
      <div id="status" class="notice">Checking authentication...</div>

      <div class="field">
        <label for="member">Team member</label>
        <select id="member"></select>
      </div>

      <div class="field">
        <label for="team">Team</label>
        <input id="team" type="text" readonly />
      </div>

      <div class="field">
        <label for="file">File</label>
        <input id="file" type="file" />
      </div>

      <button class="button" id="uploadBtn" type="button">Upload File To Repository</button>
      <pre id="uploadResult"></pre>
    </section>
  </main>

  <script type="module">
    import { TEAM_MEMBERS, getMemberBySlug } from "./assets/js/members-data.js";
    import {
      fetchCurrentUser,
      requireAuth,
      saveUploadedFile
    } from "./assets/js/github-auth.js";

    requireAuth();

    const status = document.getElementById("status");
    const memberSelect = document.getElementById("member");
    const teamInput = document.getElementById("team");
    const fileInput = document.getElementById("file");
    const uploadResult = document.getElementById("uploadResult");

    function safeName(name) {
      return name.replace(/[^a-zA-Z0-9._-]+/g, "-");
    }

    function timestamp() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }

    function updateTeam() {
      const member = getMemberBySlug(memberSelect.value);
      teamInput.value = member ? member.team : "";
    }

    memberSelect.innerHTML = TEAM_MEMBERS
      .slice()
      .sort((a, b) => a.name.localeCompare(b.name))
      .map((member) => `<option value="${member.slug}">${member.name}</option>`)
      .join("");

    memberSelect.addEventListener("change", updateTeam);
    updateTeam();

    try {
      const user = await fetchCurrentUser();
      status.textContent = `Signed in as ${user.login}.`;
      status.className = "notice ok";
    } catch (error) {
      status.textContent = `Authentication check failed: ${error.message}`;
      status.className = "notice";
    }

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const member = getMemberBySlug(memberSelect.value);
      const file = fileInput.files[0];

      if (!member) {
        status.textContent = "Select a member.";
        status.className = "notice";
        return;
      }

      if (!file) {
        status.textContent = "Choose a file to upload.";
        status.className = "notice";
        return;
      }

      const repoPath = `members/${member.slug}/uploads/${timestamp()}_${safeName(file.name)}`;

      try {
        status.textContent = "Uploading file to GitHub...";
        status.className = "notice";

        const result = await saveUploadedFile({
          repoPath,
          file,
          message: `Upload ${file.name} for ${member.name}`
        });

        status.textContent = "Upload successful.";
        status.className = "notice ok";
        uploadResult.textContent = `Saved path: ${repoPath}\nCommit: ${result.commit?.html_url || "(commit URL unavailable)"}`;
      } catch (error) {
        status.textContent = `Upload failed: ${error.message}`;
        status.className = "notice";
      }
    });
  </script>
</body>
</html>
