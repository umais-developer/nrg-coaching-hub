<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes · NRG Coaching Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <script src="assets/js/config.js?v=20260519"></script>
</head>
<body>
  <main class="container">
    <nav class="top-nav">
      <div class="brand">NRG Coaching Hub</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="teams-roster.html">Roster</a>
        <a href="workshop-sessions-1A-US.html">Workshops</a>
        <a href="discussions.html">Discussions</a>
        <a href="uploads.html">Uploads</a>
        <a href="login.html">Login</a>
      </div>
    </nav>

    <section class="hero">
      <h1>Save Coaching Discussion</h1>
      <p>
        Choose a team member, confirm their team, set your meeting date, and save notes.
        Each save creates a unique text file under members/member-slug/notes in the repo.
      </p>
    </section>

    <section class="card">
      <div id="status" class="notice">Checking authentication...</div>

      <div class="field">
        <label for="member">Team member</label>
        <select id="member"></select>
      </div>

      <div class="field">
        <label for="team">Team</label>
        <input id="team" type="text" readonly />
      </div>

      <div class="field">
        <label for="meetingDate">Meeting date</label>
        <input id="meetingDate" type="date" />
      </div>

      <div class="field">
        <label for="notes">Discussion notes</label>
        <textarea id="notes" placeholder="What did you discuss? Decisions, blockers, action items..."></textarea>
      </div>

      <button class="button" id="saveBtn">Save Notes To Repository</button>
      <pre id="savedPath"></pre>
    </section>
  </main>

  <script type="module">
    import { TEAM_MEMBERS, getMemberBySlug } from "./assets/js/members-data.js";
    import {
      fetchCurrentUser,
      requireAuth,
      saveTextFile
    } from "./assets/js/github-auth.js";

    requireAuth();

    const status = document.getElementById("status");
    const memberSelect = document.getElementById("member");
    const teamInput = document.getElementById("team");
    const meetingDate = document.getElementById("meetingDate");
    const notesEl = document.getElementById("notes");
    const savedPath = document.getElementById("savedPath");

    function formatNowForFile(d) {
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }

    function updateTeam() {
      const member = getMemberBySlug(memberSelect.value);
      teamInput.value = member ? member.team : "";
    }

    memberSelect.innerHTML = TEAM_MEMBERS
      .slice()
      .sort((a, b) => a.name.localeCompare(b.name))
      .map((member) => `<option value="${member.slug}">${member.name}</option>`)
      .join("");

    memberSelect.addEventListener("change", updateTeam);
    meetingDate.valueAsDate = new Date();
    updateTeam();

    try {
      const user = await fetchCurrentUser();
      status.textContent = `Signed in as ${user.login}.`;
      status.className = "notice ok";
    } catch (error) {
      status.textContent = `Authentication check failed: ${error.message}`;
      status.className = "notice";
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const member = getMemberBySlug(memberSelect.value);
      if (!member) {
        status.textContent = "Select a member.";
        status.className = "notice";
        return;
      }

      if (!meetingDate.value) {
        status.textContent = "Meeting date is required.";
        status.className = "notice";
        return;
      }

      if (!notesEl.value.trim()) {
        status.textContent = "Notes are required.";
        status.className = "notice";
        return;
      }

      const now = new Date();
      const uniqueStamp = formatNowForFile(now);
      const fileName = `${meetingDate.value}_${uniqueStamp}.txt`;
      const repoPath = `members/${member.slug}/notes/${fileName}`;
      const content = [
        `Coach: Umais Siddiqui`,
        `Member: ${member.name}`,
        `Team: ${member.team}`,
        `Meeting Date: ${meetingDate.value}`,
        `Saved At: ${now.toISOString()}`,
        "",
        "Discussion Notes:",
        notesEl.value.trim()
      ].join("\n");

      try {
        status.textContent = "Saving note file to GitHub...";
        status.className = "notice";

        const result = await saveTextFile({
          repoPath,
          text: content,
          message: `Add coaching note for ${member.name} on ${meetingDate.value}`
        });

        status.textContent = "Saved successfully.";
        status.className = "notice ok";
        savedPath.textContent = `Saved path: ${repoPath}\nCommit: ${result.commit?.html_url || "(commit URL unavailable)"}`;
      } catch (error) {
        status.textContent = `Save failed: ${error.message}`;
        status.className = "notice";
      }
    });
  </script>
</body>
</html>
