<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // Redirect to /auth-callback instead of /login to avoid GitHub Pages
      // serving this very file for the /login pretty-URL, which creates an
      // infinite redirect loop.
      const target = `${location.origin}/auth-callback${location.search}`;
      location.replace(target);
    </script>
  </body>
</html>
